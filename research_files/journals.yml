  date: "2024-12-01"
  image: "images/Research/publications/promdes2025.JPG"
  description: |

    During the convertibility, Argentina maintained a debtor position vis-Ã -vis the rest of the world, while in post-convertibility it holds a creditor position. However, in both periods the country recorded large deficits in the Investment Income account within the Current Account. From 2010 onwards, the Current Account turned negative without negatively affecting the country's Net International Investment Position. To explain these phenomena, the paper presents an analysis of the return differential in Argentina's external balance sheet is, considering both the income received and paid and the capital gains on external assets and liabilities. The results indicate that these financial factors played a key role between 1993 and 2003. Cumulative net income flows accumulated a deficit of $309.862 million dollars, while changes in the prices of these assets and liabilities generated $308.882 million dollars in capital gains. The calculation of the return differential between assets and liabilities indicates that it was negative, averaging -3.6 %. This differential is explained both by the weight of each type of instrument in the external balance sheet and by the difference in returns between similar instruments in external assets and liabilities. In conclusion, the negative return differential explains the persistent deficits in Investment Income, even with a creditor position vis-Ã -vis the rest of the world. On the other hand, capital gains explain how, despite having an accumulated deficit in the Current Account since 2010, the Net International Investment Position improved, particularly due to strong devaluations during that period.
    
    [Link](https://desafiosdeldesarrollo.uno.edu.ar/wp-content/uploads/2024/12/Rev.-Desafios-del-desarrollo-N%C2%B06-WEIGANDI.pdf){.btn .btn-outline-primary .btn-sm}

- title: "Local Currency Bond Markets in Africa: Resilience and Subordination"
  subtitle: "Development and Change. Volume 54, Issue 5. October 2023 - Co-authors: Florence Dafe, Annina Kaltenbrunner, Ingrid Harvold Kvangraven."
  date: "2023-10-01"
  image: "images/Research/publications/devch2023.jpg"
  description: |
    
    This article examines the development and implications of local currency bond markets (LCBMs) in African countries in the context of international financial subordination (IFS). Despite the promotion of LCBMs as a solution to debt vulnerability, there is a dearth of research that offers a systematic empirical examination of their actual benefits along with conceptual explanations as to when and why such benefits may or may not materialize. This is especially true for countries at the bottom of the global economic hierarchy. To explore how the subordination in global production and financial systems shapes LCBM development, the article offers an empirical analysis of selected African countries that combines interviews with policy makers, officials and experts with statistical data. The findings suggest that while LCBMs offer some benefits, such as mitigating risks associated with foreign currency debt, their potential is limited by the structural processes created by IFS, such as their dependence on the global financial cycle, the relatively higher costs of this debt and the sustained constraint on macroeconomic policy making. However, there are also domestic factors which shape how these structural constraints are mediated in the context of LCBM development â€” in particular, historically developed financial structures of developing countries, the political economy of the state and the structure of production. This study thus contributes to the debate about the developmental benefits of domestic debt market development and the emerging research agenda on IFS.

    [Link](https://onlinelibrary.wiley.com/doi/full/10.1111/dech.12797){.btn .btn-outline-primary .btn-sm}

