- title: "Global Money and the Balance of Payments: How Do Global Banks Drive the Cross-Country US Dollar Credit Conditions?"
  subtitle: "Review of Keynesian Economics, Volume 14, Issue 2. April 2026"
  date: "2026-04-01"
  image: "images/Research/publications/roke2026.JPG"
  description: |
   
    The US dollar is the most widely used cross-border means of payment. Countries require access to these US dollars to pay for most of their balance of payments-related transactions, and restricted access to them can constrain their growth possibilities. Yet, the literature about the mechanisms behind the creation and distribution of US dollars across borders is fragmented. Based on the endogenous money and Minskyan perspectives, this paper explores theoretically how internationally accepted US dollars are created through global banks' credit operations. The credit conditions of these operations ultimately influence the countries' costs and ability to participate in cross-border transactions. Particularly, this paper explores how global banks determine cross-country US dollar credit conditions based on two main factors: their general pricing decisions, determined by their desired balance sheet structures, and their assessments of the borrowers' creditworthiness, which are based on their expectations regarding borrowers' future access to US dollars. Fluctuations of these factors can act as exogenous sources of pressure for the balance of payments of countries across the world. 
   
    [Link](https://doi.org/10.4337/roke.2026.02.04){.btn .btn-outline-primary .btn-sm}

- title: "Non-Bank Financial Institutions in the Extended Banking System: A Functional Taxonomy"
  subtitle: "Review of Political Economy, Volume 37, Issue 5. December 2025"
  date: "2025-12-01"
  image: "images/Research/publications/rope2025.jpg"
  description: |
    In recent years, Non-Bank Financial Institutions (NBFIs) have overtaken banks as key actors in various financial activities. However, NBFIs encompass a wide range of institutions with diverse business models, making it essential to clarify their roles in the financial system. While post-Keynesian research highlights that NBFIs are integrated into the banking system â€” rather than functioning as a separate alternative â€” existing approaches often oversimplify their diversity or rely on overly detailed descriptions. This paper addresses the gap by proposing a simple, theoretically grounded taxonomy of NBFI activities based on post-Keynesian and Minskyan insights. It classifies NBFIsâ€™ activities into three categories: (1) non-leveraged lending, where NBFIs passively accept bank-created deposits and use them to purchase financial assets, potentially expanding credit without increasing the money supply; (2) leveraged lending, where NBFIs borrow from financial institutions to extend credit, potentially increasing both credit and deposits; and (3) banksâ€™ funding transformation, where NBFIs restructure banksâ€™ liabilities through instruments like repos or securitization. Drawing on recent US data, including the From-Whom-to-Whom dataset, the paper provides support for the framework, showing how NBFIs increasingly operate alongside and within the banking system. This perspective helps clarify their macro-financial implications and informs ongoing debates around regulation and systemic risk.

    [Link](https://doi.org/10.1080/09538259.2025.2590174){.btn .btn-outline-primary .btn-sm}

